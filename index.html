<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hazi Reader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e1e2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      touch-action: none;
      background-color: #121214;
      margin: 0;
      padding: 0;
    }
    .custom-scroll::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scroll::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 10px;
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
  </style>
</head>
<body class="text-gray-200 font-sans h-screen w-screen flex flex-col justify-between">

  <header class="bg-[#1a1a1e] border-b border-gray-800 px-4 py-3 flex items-center justify-between z-10 shadow-md">
    <div class="flex items-center gap-2">
      <span class="text-amber-400 font-bold text-lg tracking-wide">HAZI</span>
      <span class="text-xs bg-gray-800 px-2 py-0.5 rounded border border-gray-700 text-gray-400">READER</span>
    </div>
    <div id="loading-status" class="text-xs text-amber-400/80 animate-pulse">Memuat buku...</div>
  </header>

  <main class="flex-1 w-full bg-[#151518] overflow-auto custom-scroll relative flex justify-center items-start p-2" id="view-container">
    <canvas id="pdf-canvas" class="shadow-2xl hidden mb-20"></canvas>
  </main>

  <footer class="bg-[#1a1a1e]/95 backdrop-blur-md border-t border-gray-800 px-4 py-3 flex items-center justify-between z-10 shadow-lg pb-6">
    <button id="prev-page" class="p-2 text-gray-400 hover:text-amber-400 active:scale-95 transition disabled:opacity-30" disabled>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
    </button>
    
    <div class="flex items-center justify-center gap-1 bg-[#222227] px-3 py-1 rounded-full border border-gray-700 focus-within:border-amber-400 transition">
      <input type="number" id="page-num-input" value="0" min="1" class="bg-transparent text-amber-400 font-bold text-center w-10 outline-none border-none text-sm" disabled>
      <span class="text-xs text-gray-500"> / </span>
      <span id="page-count" class="text-xs text-gray-400 font-medium">0</span>
    </div>

    <button id="next-page" class="p-2 text-gray-400 hover:text-amber-400 active:scale-95 transition disabled:opacity-30" disabled>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
    </button>
  </footer>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let pdfDoc = null,
        pageNum = 1,
        pageRendering = false,
        pageNumPending = null,
        canvas = document.getElementById('pdf-canvas'),
        ctx = canvas.getContext('2d'),
        pageInput = document.getElementById('page-num-input');

    document.addEventListener('gesturestart', function (e) {
      e.preventDefault();
    });

    function renderPage(num) {
      pageRendering = true;
      pdfDoc.getPage(num).then((page) => {
        const containerWidth = document.getElementById('view-container').clientWidth - 16; 
        const unscaledViewport = page.getViewport({ scale: 1 });
        
        const baseScale = containerWidth / unscaledViewport.width;
        const outputScale = window.devicePixelRatio || 1;
        const viewport = page.getViewport({ scale: baseScale });

        canvas.width = Math.floor(viewport.width * outputScale);
        canvas.height = Math.floor(viewport.height * outputScale);
        
        canvas.style.width = Math.floor(viewport.width) + "px";
        canvas.style.height = Math.floor(viewport.height) + "px";

        const renderContext = {
          canvasContext: ctx,
          viewport: page.getViewport({ scale: baseScale * outputScale })
        };
        
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        
        const renderTask = page.render(renderContext);
        renderTask.promise.then(() => {
          pageRendering = false;
          if (pageNumPending !== null) {
            renderPage(pageNumPending);
            pageNumPending = null;
          }
        });
      });

      pageInput.value = num;
      localStorage.setItem('hazi_reader_last_page', num);
    }

    function queueRenderPage(num) {
      if (pageRendering) {
        pageNumPending = num;
      } else {
        renderPage(num);
      }
    }

    document.getElementById('prev-page').addEventListener('click', () => {
      if (pageNum <= 1) return;
      pageNum--;
      queueRenderPage(pageNum);
    });

    document.getElementById('next-page').addEventListener('click', () => {
      if (pageNum >= pdfDoc.numPages) return;
      pageNum++;
      queueRenderPage(pageNum);
    });

    pageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        let desiredPage = parseInt(pageInput.value);
        if (desiredPage >= 1 && desiredPage <= pdfDoc.numPages) {
          pageNum = desiredPage;
          queueRenderPage(pageNum);
          pageInput.blur();
        } else {
          pageInput.value = pageNum;
        }
      }
    });

    // Otomatis memuat file a.pdf (Bypass Cache Server Vercel)
    window.addEventListener('DOMContentLoaded', () => {
      const url = './a.pdf?v=' + Math.random();

      pdfjsLib.getDocument(url).promise.then((pdfDoc_) => {
        pdfDoc = pdfDoc_;
        document.getElementById('page-count').textContent = pdfDoc.numPages;
        pageInput.max = pdfDoc.numPages;
        
        document.getElementById('loading-status').textContent = "Selamat Membaca";
        document.getElementById('loading-status').classList.remove('animate-pulse');
        canvas.classList.remove('hidden');

        document.getElementById('prev-page').disabled = false;
        document.getElementById('next-page').disabled = false;
        pageInput.disabled = false;
        
        const savedPage = localStorage.getItem('hazi_reader_last_page');
        if (savedPage && parseInt(savedPage) <= pdfDoc.numPages) {
          pageNum = parseInt(savedPage);
        } else {
          pageNum = 1;
        }
        
        renderPage(pageNum);
      }).catch(err => {
        document.getElementById('loading-status').textContent = "Gagal memuat a.pdf";
        console.error("Detail Error PDF.js:", err);
      });
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('PWA Active!'))
          .catch(err => console.error('SW Error:', err));
      });
    }
  </script>
</body>
</html>
