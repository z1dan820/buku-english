<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hazi Reader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e1e2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      touch-action: none;
      background-color: #121214;
      margin: 0;
      padding: 0;
    }
    .custom-scroll::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scroll::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 10px;
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
  </style>
</head>
<body class="text-gray-200 font-sans h-screen w-screen flex flex-col justify-between">

  <header class="bg-[#1a1a1e] border-b border-gray-800 px-4 py-3 flex items-center justify-between z-10 shadow-md">
    <div class="flex items-center gap-2">
      <span class="text-amber-400 font-bold text-lg tracking-wide">HAZI</span>
      <span class="text-xs bg-gray-800 px-2 py-0.5 rounded border border-gray-700 text-gray-400">READER</span>
    </div>
    <div class="flex items-center gap-2">
      <button id="btn-library" class="bg-gray-800 hover:bg-gray-700 text-xs font-bold px-3 py-1.5 rounded-lg border border-gray-700 flex items-center gap-1 transition active:scale-95">
        📚 Koleksi
      </button>
      <div id="loading-status" class="text-xs text-amber-400/80">Siapkan bacaanmu</div>
    </div>
  </header>

  <main class="flex-1 w-full bg-[#151518] overflow-auto custom-scroll relative p-4 flex flex-col items-center" id="view-container">
    
    <div id="library-view" class="w-full max-w-md mx-auto mt-4">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-bold text-gray-300">Daftar Ebook Anda</h2>
        <label class="bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold px-4 py-2 rounded-xl text-xs cursor-pointer shadow-lg transition active:scale-95 flex items-center gap-1">
          ➕ Tambah PDF
          <input type="file" id="file-selector" accept=".pdf" class="hidden">
        </label>
      </div>

      <div id="book-list" class="space-y-3">
        <div id="empty-state" class="text-center text-sm text-gray-500 py-10">Belum ada koleksi buku. Silakan tambah PDF baru dari HP Anda.</div>
      </div>
    </div>

    <canvas id="pdf-canvas" class="shadow-2xl hidden mb-20 mt-2"></canvas>
  </main>

  <footer id="reader-controls" class="bg-[#1a1a1e]/95 backdrop-blur-md border-t border-gray-800 px-4 py-3 flex items-center justify-between z-10 shadow-lg pb-6 hidden">
    <button id="prev-page" class="p-2 text-gray-400 hover:text-amber-400 active:scale-95 transition disabled:opacity-30" disabled>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
    </button>
    
    <div class="flex items-center justify-center gap-1 bg-[#222227] px-3 py-1 rounded-full border border-gray-700 focus-within:border-amber-400 transition">
      <input type="number" id="page-num-input" value="0" min="1" class="bg-transparent text-amber-400 font-bold text-center w-10 outline-none border-none text-sm" disabled>
      <span class="text-xs text-gray-500"> / </span>
      <span id="page-count" class="text-xs text-gray-400 font-medium">0</span>
    </div>

    <button id="next-page" class="p-2 text-gray-400 hover:text-amber-400 active:scale-95 transition disabled:opacity-30" disabled>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
    </button>
  </footer>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let pdfDoc = null,
        pageNum = 1,
        pageRendering = false,
        pageNumPending = null,
        currentBookId = null,
        canvas = document.getElementById('pdf-canvas'),
        ctx = canvas.getContext('2d'),
        pageInput = document.getElementById('page-num-input'),
        libraryView = document.getElementById('library-view'),
        readerControls = document.getElementById('reader-controls'),
        loadingStatus = document.getElementById('loading-status'),
        bookListContainer = document.getElementById('book-list');

    // --- INISIALISASI INDEXEDDB ---
    let db = null;
    const dbRequest = indexedDB.open('HaziReaderDB', 1);

    dbRequest.onupgradeneeded = (e) => {
      db = e.target.result;
      if (!db.objectStoreNames.contains('books')) {
        db.createObjectStore('books', { keyPath: 'id', autoIncrement: true });
      }
    };

    dbRequest.onsuccess = (e) => {
      db = e.target.result;
      renderLibrary(); // Muat daftar koleksi saat aplikasi dibuka
    };

    document.addEventListener('gesturestart', function (e) { e.preventDefault(); });

    // --- FITUR RENDER HALAMAN PDF ---
    function renderPage(num) {
      pageRendering = true;
      pdfDoc.getPage(num).then((page) => {
        const containerWidth = document.getElementById('view-container').clientWidth - 16; 
        const unscaledViewport = page.getViewport({ scale: 1 });
        const baseScale = containerWidth / unscaledViewport.width;
        const outputScale = window.devicePixelRatio || 1;
        const viewport = page.getViewport({ scale: baseScale });

        canvas.width = Math.floor(viewport.width * outputScale);
        canvas.height = Math.floor(viewport.height * outputScale);
        canvas.style.width = Math.floor(viewport.width) + "px";
        canvas.style.height = Math.floor(viewport.height) + "px";

        const renderContext = {
          canvasContext: ctx,
          viewport: page.getViewport({ scale: baseScale * outputScale })
        };
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        
        page.render(renderContext).promise.then(() => {
          pageRendering = false;
          if (pageNumPending !== null) {
            renderPage(pageNumPending);
            pageNumPending = null;
          }
        });
      });

      pageInput.value = num;
      // Simpan halaman terakhir dibaca KHUSUS untuk ID buku ini
      if (currentBookId) {
        localStorage.setItem(`last_page_book_${currentBookId}`, num);
      }
    }

    function queueRenderPage(num) {
      if (pageRendering) { pageNumPending = num; } else { renderPage(num); }
    }

    // --- CONTROLLER NAVIGASI ---
    document.getElementById('prev-page').addEventListener('click', () => {
      if (pageNum <= 1) return;
      pageNum--;
      queueRenderPage(pageNum);
    });

    document.getElementById('next-page').addEventListener('click', () => {
      if (pageNum >= pdfDoc.numPages) return;
      pageNum++;
      queueRenderPage(pageNum);
    });

    pageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        let desiredPage = parseInt(pageInput.value);
        if (desiredPage >= 1 && desiredPage <= pdfDoc.numPages) {
          pageNum = desiredPage;
          queueRenderPage(pageNum);
          pageInput.blur();
        } else {
          pageInput.value = pageNum;
        }
      }
    });

    // --- MANAJEMEN LIBRARY (SAVE/LOAD/DELETE) ---
    
    // Tambah Buku Baru ke HP
    document.getElementById('file-selector').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file || file.type !== 'application/pdf') return;

      loadingStatus.textContent = "Menyimpan ke memori HP...";
      
      const fileReader = new FileReader();
      fileReader.onload = function() {
        const blobData = new Blob([this.result], { type: 'application/pdf' });
        
        const transaction = db.transaction(['books'], 'readwrite');
        const store = transaction.objectStore('books');
        
        const newBook = {
          title: file.name.replace('.pdf', ''),
          data: blobData,
          addedAt: new Date().toLocaleDateString('id-ID')
        };

        store.add(newBook);

        transaction.oncomplete = () => {
          loadingStatus.textContent = "Buku berhasil disimpan!";
          renderLibrary();
        };
      };
      fileReader.readAsArrayBuffer(file);
    });

    // Tampilkan Daftar Koleksi dari Penyimpanan HP
    function renderLibrary() {
      const transaction = db.transaction(['books'], 'readonly');
      const store = transaction.objectStore('books');
      const getAllRequest = store.getAll();

      getAllRequest.onsuccess = () => {
        const books = getAllRequest.result;
        bookListContainer.innerHTML = '';

        if (books.length === 0) {
          bookListContainer.innerHTML = '<div class="text-center text-sm text-gray-500 py-10">Belum ada koleksi buku. Silakan tambah PDF baru dari HP Anda.</div>';
          return;
        }

        books.forEach((book) => {
          const lastSavedPage = localStorage.getItem(`last_page_book_${book.id}`) || 1;
          
          const item = document.createElement('div');
          item.className = "bg-[#1a1a1e] border border-gray-800 p-4 rounded-xl flex items-center justify-between shadow-md gap-3";
          item.innerHTML = `
            <div class="flex-1 min-w-0 cursor-pointer" onclick="openBook(${book.id})">
              <h3 class="font-bold text-amber-400 text-sm truncate">${book.title}</h3>
              <p class="text-xs text-gray-500 mt-1">Halaman Terakhir: Hal ${lastSavedPage} • Ditambahkan: ${book.addedAt}</p>
            </div>
            <button onclick="deleteBook(${book.id})" class="text-gray-600 hover:text-red-500 p-1 transition active:scale-90">
              🗑️
            </button>
          `;
          bookListContainer.appendChild(item);
        });
      };
    }

    // Buka dan Baca Buku dari Koleksi
    window.openBook = function(id) {
      loadingStatus.textContent = "Membuka halaman...";
      currentBookId = id;

      const transaction = db.transaction(['books'], 'readonly');
      const store = transaction.objectStore('books');
      const getRequest = store.get(id);

      getRequest.onsuccess = () => {
        const book = getRequest.result;
        
        const fileReader = new FileReader();
        fileReader.onload = function() {
          const typedarray = new Uint8Array(this.result);

          pdfjsLib.getDocument({ data: typedarray, disableAutoFetch: true, disableStream: true }).promise.then((pdfDoc_) => {
            pdfDoc = pdfDoc_;
            document.getElementById('page-count').textContent = pdfDoc.numPages;
            pageInput.max = pdfDoc.numPages;
            
            loadingStatus.textContent = "Mode Membaca";
            
            // Sembunyikan Library, Tampilkan Modul Reader
            libraryView.classList.add('hidden');
            canvas.classList.remove('hidden');
            readerControls.classList.remove('hidden');

            document.getElementById('prev-page').disabled = false;
            document.getElementById('next-page').disabled = false;
            pageInput.disabled = false;
            
            // Set posisi halaman terakhir khusus buku ini
            const savedPage = localStorage.getItem(`last_page_book_${id}`);
            pageNum = (savedPage && parseInt(savedPage) <= pdfDoc.numPages) ? parseInt(savedPage) : 1;
            
            renderPage(pageNum);
          });
        };
        fileReader.readAsArrayBuffer(book.data);
      };
    };

    // Hapus Buku dari Koleksi HP
    window.deleteBook = function(id) {
      if (!confirm("Hapus buku ini dari penyimpanan HP?")) return;
      
      const transaction = db.transaction(['books'], 'readwrite');
      const store = transaction.objectStore('books');
      store.delete(id);

      transaction.oncomplete = () => {
        localStorage.removeItem(`last_page_book_${id}`);
        renderLibrary();
      };
    };

    // Tombol Kembali ke Menu Library Atas
    document.getElementById('btn-library').addEventListener('click', () => {
      currentBookId = null;
      canvas.classList.add('hidden');
      readerControls.classList.add('hidden');
      libraryView.classList.remove('hidden');
      loadingStatus.textContent = "Mode Koleksi";
      renderLibrary(); // Refresh info halaman terakhir dibaca
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => console.error('SW Error:', err));
      });
    }
  </script>
</body>
</html>
